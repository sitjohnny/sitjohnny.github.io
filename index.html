<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roosevelt Ave Food Crawl</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <header id="progress-header" class="progress-header">
      <div class="progress-header__inner">
        <p
          id="progress-counts"
          class="progress-header__counts"
          aria-live="polite"
        ></p>
        <div
          class="progress-header__track"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-label="Crawl completion"
        >
          <div id="progress-fill" class="progress-header__fill"></div>
        </div>
      </div>
    </header>
    <button
      id="next-stop-banner"
      class="next-stop-banner"
      type="button"
      aria-live="polite"
    >
      <span class="next-stop-banner__title"></span>
      <span class="next-stop-banner__address"></span>
    </button>
    <div id="app"></div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
